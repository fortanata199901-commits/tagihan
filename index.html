<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker - Dashboard Pelunasan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; scroll-behavior: smooth; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .checkbox-modern { width: 24px; height: 24px; cursor: pointer; accent-color: #2563eb; border-radius: 6px; }
        .input-note { width: 100%; min-height: 45px; background: transparent; border-bottom: 1px dashed #cbd5e1; transition: all 0.3s ease; resize: vertical; }
        .input-note:focus { border-bottom: 2px solid #2563eb; outline: none; background: #ffffff; padding: 5px; border-radius: 4px; }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: rgba(248, 250, 252, 0.8); backdrop-filter: blur(8px); }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; font-weight: 800; }
        .hidden-content { display: none; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12">

<div class="max-w-6xl mx-auto">
    <div class="sticky-header pb-2 mb-8 border-b border-slate-200">
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 mb-4">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tighter">FINANCE TRACKER</h1>
                <p class="text-slate-500 font-medium italic">Januari 2026 – Desember 2030</p>
            </div>
            <nav class="flex gap-8 text-sm font-bold uppercase tracking-widest text-slate-400">
                <button onclick="switchTab('tracker')" id="tab-tracker" class="py-2 tab-active transition-all">📊 Tracker</button>
                <button onclick="switchTab('drive')" id="tab-drive" class="py-2 transition-all">📂 Riwayat Tagihan</button>
            </nav>
        </div>
    </div>

    <div id="section-tracker">
        <div class="mb-8">
            <div class="flex justify-between items-end mb-2">
                <span class="text-[10px] font-bold uppercase text-slate-400 tracking-[0.2em]">Total Pelunasan Keseluruhan</span>
                <span id="overall-percent" class="text-2xl font-black text-blue-600">0%</span>
            </div>
            <div class="w-full bg-slate-200 h-4 rounded-full p-1 shadow-inner">
                <div id="progress-fill" class="h-full bg-gradient-to-r from-blue-600 to-indigo-500 rounded-full transition-all duration-700" style="width: 0%"></div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-card p-6 rounded-[2rem] shadow-xl flex items-center gap-4 border-l-4 border-blue-600">
                <div class="bg-blue-600 text-white w-12 h-12 flex items-center justify-center rounded-2xl">🏦</div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Sisa Kredit CU</p>
                    <h3 id="display-cu" class="text-xl font-extrabold text-slate-800">Rp25.0jt</h3>
                </div>
            </div>
            <div class="glass-card p-6 rounded-[2rem] shadow-xl flex items-center gap-4 border-l-4 border-emerald-500">
                <div class="bg-emerald-500 text-white w-12 h-12 flex items-center justify-center rounded-2xl">🤝</div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Sisa P. Orang</p>
                    <h3 id="display-org" class="text-xl font-extrabold text-slate-800">Rp20.0jt</h3>
                </div>
            </div>
            <div class="glass-card p-6 rounded-[2rem] shadow-xl flex items-center gap-4 border-l-4 border-orange-400">
                <div class="bg-orange-100 text-orange-600 w-12 h-12 flex items-center justify-center rounded-2xl">⏳</div>
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Sisa Waktu</p>
                    <h3 id="months-left" class="text-xl font-extrabold text-slate-800">60 Bln</h3>
                </div>
            </div>
        </div>

        <div id="tracker-content" class="space-y-16">
            </div>
    </div>

    <footer class="mt-20 py-10 border-t border-slate-200 text-center text-slate-400 text-sm italic">
        "Disiplin adalah kunci kebebasan finansial."
    </footer>
</div>

<script>
// ===== CONFIGURATION =====
const API_URL = 'https://sheetdb.io/api/v1/my8w8kgcrd0ao';
const years = [2026, 2027, 2028, 2029, 2030];
const months = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

// Pengaturan Nilai
const TOTAL_CU_AWAL = 25000000;
const TOTAL_ORG_AWAL = 20000000;
const POTONGAN_CU = 600000;
const POTONGAN_ORG = 400000;

// ===== TAB LOGIC (REDIRECT) =====
function switchTab(target) {
    if(target === 'tracker') {
        document.getElementById('section-tracker').classList.remove('hidden-content');
        document.getElementById('tab-tracker').classList.add('tab-active');
        document.getElementById('tab-drive').classList.remove('tab-active');
    } else {
        // Langsung diarahkan ke halaman eksternal Google Script
        window.location.href = "https://script.google.com/macros/s/AKfycbwrHddaTB0o7Xu1ZIXBbqfXFcyfyifO5nc6kDH2FXBDne6hKZFWhfxbs5HluXmgqLIbzA/exec";
    }
}

// ===== TRACKER LOGIC =====
function buildTable() {
    let html = '';
    years.forEach(y => {
        html += `
        <div class="bg-white rounded-[2.5rem] shadow-xl overflow-hidden border border-slate-100">
            <div class="bg-slate-900 px-8 py-4 flex justify-between items-center text-white">
                <h2 class="font-black text-xl uppercase tracking-tighter">TAHUN ${y}</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50 text-slate-400 text-[10px] font-black uppercase tracking-widest border-b border-slate-100">
                            <th class="px-8 py-4">Bulan</th>
                            <th class="px-4 py-4 text-center">CU (600rb)</th>
                            <th class="px-4 py-4 text-center">Org (400rb)</th>
                            <th class="px-8 py-4">Catatan</th>
                            <th class="px-8 py-4 text-right">Aksi</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-50">`;
        months.forEach(m => {
            const id = `${y}-${m}`;
            html += `
                <tr class="group hover:bg-blue-50/20">
                    <td class="px-8 py-4 font-bold text-slate-700">${m}</td>
                    <td class="px-4 py-4 text-center"><input type="checkbox" id="cu-${id}" onchange="updateProgress()" class="checkbox-modern"></td>
                    <td class="px-4 py-4 text-center"><input type="checkbox" id="org-${id}" onchange="updateProgress()" class="checkbox-modern"></td>
                    <td class="px-8 py-4"><textarea id="note-${id}" class="input-note text-sm" placeholder="Detail..."></textarea></td>
                    <td class="px-8 py-4 text-right">
                        <button onclick="saveData('${m} ${y}','${id}', this)" class="w-10 h-10 rounded-xl border border-slate-200 flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all">💾</button>
                    </td>
                </tr>`;
        });
        html += `</tbody></table></div></div>`;
    });
    document.getElementById('tracker-content').innerHTML = html;
}

// ===== LOGIKA PENGURANGAN OTOMATIS =====
function updateProgress() {
    // Hitung checkbox yang tercentang
    const checkedCU = document.querySelectorAll('input[id^="cu-"]:checked').length;
    const checkedOrg = document.querySelectorAll('input[id^="org-"]:checked').length;
    const totalCheckboxes = document.querySelectorAll('input[type="checkbox"]').length;
    const totalChecked = document.querySelectorAll('input[type="checkbox"]:checked').length;

    // Kalkulasi Sisa Uang
    const sisaCU = TOTAL_CU_AWAL - (checkedCU * POTONGAN_CU);
    const sisaOrg = TOTAL_ORG_AWAL - (checkedOrg * POTONGAN_ORG);

    // Update Tampilan Angka (Format Juta)
    document.getElementById('display-cu').innerText = "Rp" + (sisaCU / 1000000).toFixed(1) + "jt";
    document.getElementById('display-org').innerText = "Rp" + (sisaOrg / 1000000).toFixed(1) + "jt";

    // Sisa Bulan berdasarkan CU (Total 60 bulan)
    const sisaBulan = 60 - checkedCU;
    document.getElementById('months-left').innerText = sisaBulan + ' Bln';

    // Update Progress Bar
    const percent = Math.round((totalChecked / totalCheckboxes) * 100);
    document.getElementById('progress-fill').style.width = percent + '%';
    document.getElementById('overall-percent').innerText = percent + '%';
}

// ===== SIMPAN KE SHEETDB =====
async function saveData(bulan, id, btn) {
    btn.innerText = "⏳"; btn.disabled = true;
    const payload = {
        "Bulan": bulan,
        "Kredit CU": document.getElementById('cu-' + id).checked ? 'YA' : 'TIDAK',
        "Pinjaman Orang": document.getElementById('org-' + id).checked ? 'YA' : 'TIDAK',
        "Catatan": document.getElementById('note-' + id).value
    };
    try {
        await fetch(API_URL, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ data: payload })
        });
        btn.innerText = "✅"; btn.classList.add('bg-emerald-500','text-white');
        setTimeout(() => { btn.innerText = "💾"; btn.classList.remove('bg-emerald-500','text-white'); btn.disabled = false; }, 2000);
    } catch (error) { 
        alert('Gagal menyimpan data ke Spreadsheet'); 
        btn.innerText = "💾"; btn.disabled = false; 
    }
}

// ===== MUAT DATA SAAT STARTUP =====
async function loadSheetData() {
    try {
        const response = await fetch(API_URL);
        const rows = await response.json();
        rows.forEach(row => {
            if (!row.Bulan) return;
            const parts = row.Bulan.split(' ');
            const id = `${parts[1]}-${parts[0]}`;
            if(document.getElementById('cu-' + id)) document.getElementById('cu-' + id).checked = row['Kredit CU'] === 'YA';
            if(document.getElementById('org-' + id)) document.getElementById('org-' + id).checked = row['Pinjaman Orang'] === 'YA';
            if(document.getElementById('note-' + id)) document.getElementById('note-' + id).value = row['Catatan'] || '';
        });
        updateProgress();
    } catch (e) { console.log("Gagal memuat data / Data masih kosong"); }
}

// Inisialisasi
document.addEventListener('DOMContentLoaded', () => {
    buildTable();
    loadSheetData();
});
</script>
</body>
</html>
